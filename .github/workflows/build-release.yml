name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ApkAnalyzer-Windows
        path: |
          ${{github.workspace}}/build/Release/*.exe
          ${{github.workspace}}/build/Release/*.dll

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: ApkAnalyzer-Windows
        path: release/windows

    - name: Download Linux Artifacts
      uses: actions/download-artifact@v4
      with:
        name: ApkAnalyzer-Linux
        path: release/linux

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/windows/*
          release/linux/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcursor-dev libxinerama-dev libxrandr-dev libxi-dev libgl-dev

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ApkAnalyzer-Linux
        path: |
          ${{github.workspace}}/build/apk_offset_gen
          ${{github.workspace}}/build/apkcore.so
